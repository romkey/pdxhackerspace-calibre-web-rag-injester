services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"

  tests:
    image: python:3.11-slim
    working_dir: /workspace
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - HF_HOME=${HF_CACHE_DIR:-/hf-cache}
      - TRANSFORMERS_CACHE=${HF_CACHE_DIR:-/hf-cache}
      - SENTENCE_TRANSFORMERS_HOME=${HF_CACHE_DIR:-/hf-cache}
    volumes:
      - ./:/workspace
      - ${HF_CACHE_HOST_DIR:-./.cache/huggingface}:${HF_CACHE_DIR:-/hf-cache}
    depends_on:
      - qdrant
    command: >
      sh -c "pip install --no-cache-dir -e .[dev] &&
             pytest -q"
